name: Flutter Build & Release APK

# Memicu build otomatis setiap kali ada push tag versi baru (contoh: v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode repositori Anda
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java JDK 17 (Wajib untuk build Android)
      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter SDK stable versi terbaru
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Ambil dependency library pubspec.yaml
      - name: Install dependencies
        run: flutter pub get

      # 5. Compile aplikasi menjadi APK Release dengan menyuntikkan rahasia kredensial
      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      # 6. Ganti nama file APK agar rapi dengan format versi
      - name: Rename APK File
        run: mv build/app/outputs/flutter-apk/app-release.apk Vaulticor-${{ github.ref_name }}.apk

      # 7. Membuat GitHub Release otomatis dan mengunggah berkas APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Vaulticor-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
